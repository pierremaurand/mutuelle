<app-search-bar
  [count]="count"
  [singular]="singular"
  [searchCount]="searchCount"
  (searchChange)="onSearchChange($event)"
></app-search-bar>
<div class="row">
  <div class="col-12">
    <div class="shadow p-3 mb-3 bg-body rounded">
      <div class="row d-flex justify-content-between">
        <div class="col-8 liste">
          <table class="table table-striped table-hover">
            <thead>
              <tr>
                <th scope="col" class="text-center">#</th>
                <th scope="col" class="text-center">Photo</th>
                <th scope="col" class="text-center">Nom</th>
                <th scope="col" class="text-center">Contact</th>
              </tr>
            </thead>
            <tbody>
              <tr
                *ngFor="let membre of listeMembres; let i = index"
                (click)="showProfile(membre)"
              >
                <th scope="row" class="text-center align-middle">
                  {{ i + 1 }}
                </th>
                <td class="text-center align-middle">
                  <img
                    src="{{ membre.photoUrl }}"
                    alt=""
                    [ngClass]="{
                      'img-thumbnail': true,
                      inactif: !membre.estActif
                    }"
                  />
                </td>
                <td class="align-middle">{{ membre.nom | uppercase }}</td>
                <td class="text-end align-middle">{{ membre.contact }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="col-4">
          <app-profil-membre [membre]="membre"></app-profil-membre>
        </div>
      </div>
    </div>
  </div>
</div>
