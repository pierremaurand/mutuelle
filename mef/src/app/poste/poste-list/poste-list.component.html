<div class="card shadow content">
  <div class="card-body">
    <div class="row">
      <div class="col-8">
        <table class="table table-striped table-hover">
          <thead class="thead-light">
            <tr>
              <th scope="col">#</th>
              <th scope="col">Poste</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let poste of postes" (click)="showDetails(poste.id)">
              <th scope="row">{{ poste.id }}</th>
              <td>{{ poste.libelle }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
