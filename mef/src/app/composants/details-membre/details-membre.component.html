<div class="row">
  <div class="col-md-1 text-center">
    <img
      src="{{ imagesUrl }}/assets/images/{{ membre.photo }}"
      width="64"
      height="64"
      class="rounded-circle"
    />
  </div>
  <div class="col-md-11 align-item-center">
    <div class="d-flex justify-content-between">
      <h5>{{ membre.nom }}</h5>
      <h5 *ngIf="afficheSolde">{{ solde | number }} FCFA</h5>
    </div>
    <p class="text-primary">
      <i class="fa fa-venus-mars"></i> {{ membre.sexe | uppercase }} |
      <i class="fa fa-sitemap"></i> {{ membre.poste | uppercase }} |
      <i class="fa fa-building"></i> {{ membre.lieu | uppercase }}
    </p>
  </div>
</div>
