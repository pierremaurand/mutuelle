<div class="row mb-1">
  <div class="col-12 p-0">
    <div class="card border">
      <div class="card-body p-1">
        <div class="row rounded-start">
          <div class="col-md-2 cadre-photo-membre-liste border-end">
            <img
              src="{{ membre.photoUrl }}"
              alt=""
              class="rounded-start membre-liste"
            />
          </div>
          <div class="col-md-4 border-end">
            <div class="row">
              <div class="col-1 text-primary">
                <i class="fa fa-info-circle"></i>
              </div>
              <div class="col-11">
                {{ membre.nom | uppercase }}
              </div>
            </div>
            <div class="row">
              <div class="col-1 text-primary">
                <i class="fa fa-info-circle"></i>
              </div>
              <div class="col-11">
                {{ membre.sexe?.nom }}
              </div>
            </div>
            <div class="row">
              <div class="col-1 text-primary">
                <i class="far fa-calendar-alt"></i>
              </div>
              <div class="col-11">
                {{ membre.dateNaissance | date }}
              </div>
            </div>
            <div class="row">
              <div class="col-1 text-primary">
                <i class="fas fa-map-marker-alt"></i>
              </div>
              <div class="col-11">
                {{ membre.lieuNaissance }}
              </div>
            </div>
          </div>
          <div class="col-md-3 border-end d-flex justify-content-center">
            <span class="h4 d-flex align-items-center">
              {{ 10000000 | number }}
            </span>
          </div>
          <div
            class="col-md-3 d-flex justify-content-center align-items-center"
          >
            <button class="btn btn-link">
              <i class="far fa-list-alt"></i>&nbsp;Details
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
