<div class="card shadow">
  <div class="card-body">
    <div class="h3 text-info">
      <i class="fas fa-info-circle"></i> Infos Gabarit
    </div>
    <hr />
    <div class="row">
      <div class="col-7">
        <table class="table table-striped">
          <tbody>
            <tr>
              <th colspan="3">Gabarit</th>
            </tr>
            <tr>
              <td colspan="3">{{ gabarit.libelle }}</td>
            </tr>
            <tr>
              <th>Créé par</th>
              <th>Modifié le</th>
              <th>Par</th>
            </tr>
            <tr>
              <td>
                {{ gabarit.creePar }}
              </td>
              <td>
                {{ gabarit.modifieLe | date }}
              </td>
              <td>
                {{ gabarit.modifiePar }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="col-5">
        <div class="row">
          <div class="col-12">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>#</th>
                  <th>N° Compte comptable</th>
                  <th>Type Opération</th>
                  <th>Taux</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="let operation of gabarit.operations; let i = index"
                  class="align-center"
                >
                  <th>{{ i + 1 }}</th>
                  <td
                    [ngClass]="{
                      'text-start': operation.tOperation == 'Débit',
                      'text-end': operation.tOperation == 'Crédit'
                    }"
                  >
                    {{ operation.compte }}
                  </td>
                  <td>{{ operation.tOperation }}</td>
                  <td class="text-end">{{ operation.taux | number }}%</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <hr />
    <div class="row">
      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-warning" (click)="onUpdate()">
          <i class="fa fa-edit"></i>&nbsp; Modifier
        </button>
        <button type="button" class="btn btn-danger" (click)="onDelete()">
          <i class="fa fa-trash"></i>&nbsp; Supprimer
        </button>
      </div>
    </div>
  </div>
</div>
