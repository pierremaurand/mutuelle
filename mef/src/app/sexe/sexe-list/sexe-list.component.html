<div class="card shadow content">
  <div class="card-body">
    <div class="row">
      <div class="col-8">
        <table class="table table-striped table-hover">
          <thead class="thead-light">
            <tr>
              <th scope="col">#</th>
              <th scope="col">Sexe</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let sexe of sexes" (click)="showDetails(sexe.id)">
              <th scope="row">{{ sexe.id }}</th>
              <td>{{ sexe.nom }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
