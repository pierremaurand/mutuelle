<!-- Begin Page Content -->
<div class="container-fluid">
  <!-- Page Heading -->
  <div class="row mb-3">
    <div class="col-md-12">
      <h1 class="mb-2 text-gray-800">
        <i class="fa fa-list"></i>
        Liste des échéances des credits
      </h1>
    </div>
  </div>

  <!-- DataTales Example -->
  <div class="card shadow mb-4">
    <div class="card-header py-3">
      <form class="form-inline" #searchForm="ngForm">
        <div class="input-group mx-sm-3">
          <div class="input-group-prepend">
            <label for="dateEcheance" class="input-group-text"
              >Date Echéances:</label
            >
          </div>

          <input
            type="date"
            class="form-control"
            id="dateEcheance"
            name="dateEcheance"
            [(ngModel)]="dateEcheance"
            placeholder="Date Echéances"
          />
          <div class="input-group-append">
            <button class="btn btn-primary" (click)="effacer()">
              <i class="fa fa-list-alt"></i>
            </button>
          </div>
        </div>
        <div>
          <button
            type="botton"
            class="btn btn-success mr-2"
            data-toggle="modal"
            data-target="#formulaire"
            (click)="payer()"
            [disabled]="echeancier.length == 0"
          >
            <i class="fa fa-check-circle"></i> Payer
          </button>
          <button
            type="botton"
            class="btn btn-primary"
            data-toggle="modal"
            data-target="#formulaire"
            (click)="decaler()"
            [disabled]="echeancier.length == 0"
          >
            <i class="fa fa-arrow-circle-right"></i> Décaler
          </button>
        </div>
      </form>
    </div>
    <div class="card-body">
      <!-- <div class="row">
        <div class="col">
          {{ echeancier | json }}
        </div>
      </div> -->
      <table class="table table-striped table-hover table-sm">
        <tbody>
          <tr
            *ngFor="
              let echeance of echeances
                | filter : dateEcheance : 'dateEcheance'
                | sort : ['creditId', 'desc']
                | sort : ['dateEcheance', 'desc']
            "
          >
            <td>
              <app-detail-echeance-credit
                [echeance]="echeance"
                (echeanceChoisie)="addEcheance($event)"
              ></app-detail-echeance-credit>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<!-- /.container-fluid -->

<div
  id="formulaire"
  class="modal fade"
  tabindex="-1"
  aria-labelledby="formulaire"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content rounded-5 shadow">
      <app-payer-echeances-credits
        *ngIf="formulaire == 1"
        [echeancier]="echeancier"
        (echeancesPayer)="loadEcheances()"
      ></app-payer-echeances-credits>
      <app-decaler-echeances-credits
        *ngIf="formulaire == 2"
        [echeancier]="echeancier"
      ></app-decaler-echeances-credits>
    </div>
  </div>
</div>
