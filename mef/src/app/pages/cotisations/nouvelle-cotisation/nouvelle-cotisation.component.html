<div class="row">
  <div class="col-md-12">
    <div class="card border-none">
      <div class="card-body">
        <div class="row m-3">
          <div class="col-md-6">
            <h2>
              <i class="fa fa-info-circle text-primary"></i>&nbsp;Informations
              du compte
            </h2>
          </div>
          <div class="col-md-6 text-end h2">
            {{ soldeCompte() | number }} FCFA
          </div>
        </div>
        <div class="row m-3">
          <div class="col-md-3 border-end text-primary">
            <div class="row">
              <app-infos-membre
                [membre]="membre"
                [sexe]="sexe"
                [poste]="poste"
                [lieuAffectation]="lieuAffectation"
                [photo]="photo"
              ></app-infos-membre>
            </div>
          </div>
          <div class="col-md-9">
            <div class="row">
              <div class="col-md-12">
                <div class="row">
                  <div class="col">
                    <label for="mois" class="form-label">Mois</label>
                    <select
                      id="mois"
                      name="mois"
                      class="form-select"
                      [(ngModel)]="cotisation.moisId"
                      required
                    >
                      <option *ngFor="let m of mois" value="{{ m.valeur }}">
                        {{ m.libelle }}
                      </option>
                    </select>
                  </div>
                  <div class="col">
                    <label for="annee" class="form-label">Année</label>
                    <select
                      id="annee"
                      name="annee"
                      class="form-select"
                      [(ngModel)]="cotisation.annee"
                      required
                    >
                      <option *ngFor="let annee of annees" value="{{ annee }}">
                        {{ annee }}
                      </option>
                    </select>
                  </div>

                  <div class="col">
                    <label for="montant" class="form-label">Montant</label>
                    <input
                      type="number"
                      id="montant"
                      name="montant"
                      class="form-control"
                      [(ngModel)]="cotisation.montant"
                      required
                      placeholder="Montant"
                    />
                  </div>
                  <div class="col d-flex">
                    <button
                      class="btn btn-primary form-control flex-fill"
                      (click)="ajouter()"
                    >
                      <i class="fa fa-plus"></i> Ajouter
                    </button>
                  </div>
                </div>
                <hr />
                <div class="row liste">
                  <div class="col-12">
                    <table class="table table-striped">
                      <tbody>
                        <tr
                          *ngFor="
                            let cotisation of cotisations
                              | sort : ['moisId', 'desc']
                              | sort : ['annee', 'desc'];
                            let i = index
                          "
                        >
                          <td class="text-center">{{ i + 1 }}</td>
                          <td>
                            {{ getMois(cotisation.moisId) }}
                          </td>
                          <td>
                            {{ cotisation.annee }}
                          </td>
                          <td class="text-end">
                            {{ cotisation.montant | number }} FCFA
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row m-3">
          <div class="col-md-12 text-end">
            <button
              type="button"
              class="btn btn-danger me-2"
              (click)="cancel()"
            >
              <i class="fa fa-ban"></i>&nbsp; Annuler
            </button>
            <button
              type="button"
              class="btn btn-success"
              (click)="enregistrerCompte()"
            >
              <i class="fa fa-save"></i>&nbsp; Enregistrer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
