<div class="row">
  <div class="col-md-12">
    <div class="card border-none">
      <div class="card-body">
        <div class="row m-3">
          <div class="col-md-12">
            <div class="col-md-12 mb-3">
              <h2>
                <i class="fa fa-info-circle text-primary"></i>&nbsp;Informations
                du poste
              </h2>
            </div>
            <div class="col-md-12">
              <form #membreForm="ngForm">
                <div class="row">
                  <div class="mb-3 col-md-6">
                    <input
                      type="text"
                      id="nom"
                      class="form-control"
                      name="nom"
                      [(ngModel)]="poste.libelle"
                      placeholder="Le nom du poste"
                    />
                  </div>
                </div>
              </form>
            </div>
            <div class="col-md-12 text-end">
              <button
                type="button"
                class="btn btn-danger me-2"
                (click)="cancel()"
              >
                <i class="fa fa-ban"></i>&nbsp; Annuler
              </button>
              <button
                type="button"
                class="btn btn-success"
                (click)="enregistrerPoste()"
              >
                <i class="fa fa-save"></i>&nbsp; Enregistrer
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
