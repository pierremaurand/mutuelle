<div class="card shadow">
  <div class="card-body">
    <div class="card-img-wrapper mb-3 thumbnail">
      <img src="{{ photo }}" alt="photo genre" />
      <ul
        *ngIf="!hideIcons"
        class="list-inline text-center member-icons animate"
      >
        <li class="list-inline-item">
          <button class="btn btn-warning" (click)="modifier()">
            <i class="fas fa-pencil-alt"></i>
          </button>
        </li>
        <li class="list-inline-item">
          <button class="btn btn-danger">
            <i class="fas fa-trash-alt"></i>
          </button>
        </li>
        <li class="list-inline-item">
          <button class="btn btn-primary">
            <i class="far fa-list-alt"></i>
          </button>
        </li>
      </ul>
    </div>
    <div class="text-center">
      <div class="d-inline-block text-truncate h6" style="max-width: 150px">
        {{ poste?.libelle | uppercase }}
      </div>
    </div>
  </div>
</div>
