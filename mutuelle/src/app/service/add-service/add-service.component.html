<div class="container" style="margin-top: 70px; width: 1080px;">
  <div class="row">
    <div class="col-6 m-auto shadow-lg p-0 bg-white">
      <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()">
        <div class="card m-auto">
          <div class="card-header">
            <h3>{{titreFormulaire}}</h3>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <div class="row">
                <div class="col-12">
                  <label for="nom" class="form-label">Nom du service</label>
                  <input type="text" id="nom" class="form-control" formControlName="nom"
                    [ngClass]="{ 'is-invalid': nom.invalid && (nom.touched || serviceSubmitted)}"
                    [value]="service.nom">
                </div>
              </div>
            </div>
            <div class="mb-3 text-end">
              <button type="submit" class="me-2 btn btn-primary">
                <i class="fa fa-save"></i>&nbsp;
                Enregistrer
              </button>
              <button type="reset" class="btn btn-secondary me-2">
                <i class="fa fa-refresh"></i>&nbsp;
                Recommencer
              </button>
              <button type="button" class="btn btn-danger" routerLink="/services">
                <i class="fa fa-cancel"></i>&nbsp;
                Annuler
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
