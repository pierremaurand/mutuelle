<div class="card shadow">
  <div class="card-img-wrapper">
    <img src="assets/images/default_man.jpg" class="card-img-top" alt="photo membre"
      *ngIf="!membre.photo && (!membre.sexe || membre.sexe=='Masculin')">
    <img src="assets/images/default_woman.jpg" class="card-img-top" alt="photo membre"
      *ngIf="!membre.photo && (membre.sexe && membre.sexe!='Masculin')">
    <img src="{{membre.photo}}" class="card-img-top" alt="photo membre" *ngIf="membre.photo">
    <ul class="list-inline text-center member-icons animate">
      <li class="list-inline-item">
        <button class="btn btn-primary" routerLink="/property-detail"><i class="far fa-edit"></i></button>
      </li>
      <li class="list-inline-item">
        <button class="btn btn-primary"><i class="fas fa-info-circle"></i></button>
      </li>
    </ul>
  </div>
  <div class="card-body text-center">
    <h5 class="card-title">{{membre.nom | uppercase}} {{membre.prenom | uppercase}}</h5>
    <h6 class="card-text">
      <i class="fa fa-location-dot"></i>&nbsp;
      {{membre.lieuAffectation | uppercase}}
    </h6>
    <h6 class="card-text">
      <i class="fa fa-coins"></i>&nbsp;
      {{membre.cotisations | currency :"FCFA "}}
    </h6>
    <h6 class="card-text">
      <i class="fab fa-stack-overflow"></i>&nbsp;
      {{membre.avances | number}}
    </h6>
    <h6 class="card-text">
      <i class="fa fa-money-check"></i>&nbsp;
      {{membre.credits | number}}
    </h6>
  </div>
</div>
