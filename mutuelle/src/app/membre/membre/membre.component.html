<div class="card shadow">
  <div class="card-img-wrapper">
    <img src="{{baseUrl}}assets/images/default_man.jpg" class="card-img-top" alt="photo membre"
      *ngIf="!membre.photo && (!membre.sexeId || membre.sexeId==1)">
    <img src="{{baseUrl}}assets/images/default_woman.jpg" class="card-img-top" alt="photo membre"
      *ngIf="!membre.photo && (membre.sexeId && membre.sexeId==2)">
    <img src="{{baseUrl}}{{membre.photo}}" class="card-img-top" alt="photo membre" *ngIf="membre.photo">
    <ul class="list-inline text-center member-icons animate">
      <li class="list-inline-item">
        <button [class]="btnClasse()"  routerLink="/add-membre/{{membre.id}}"><i class="far fa-edit"></i></button>
      </li>
      <li class="list-inline-item">
        <button [class]="btnClasse()" routerLink="/membre-detail/{{membre.id}}"><i class="fas fa-info-circle"></i></button>
      </li>
    </ul>
  </div>
  <div class="card-body text-center">
    <h5 class="card-title">{{membre.nom | uppercase}} {{membre.prenom | uppercase}}</h5>
    <h6 class="card-text">
      <i class="fa fa-location-dot"></i>&nbsp;
      {{membre.agence | uppercase}}
    </h6>
    <h6 class="card-text">
      <i class="fa fa-coins"></i>&nbsp;
      {{membre.cotisations | currency :"FCFA "}}
    </h6>
    <h6 class="card-text">
      <i class="fab fa-stack-overflow"></i>&nbsp;
      {{membre.avances | currency :"FCFA "}}
    </h6>
    <h6 class="card-text">
      <i class="fa fa-money-check"></i>&nbsp;
      {{membre.credits | currency :"FCFA "}}
    </h6>
  </div>
</div>
