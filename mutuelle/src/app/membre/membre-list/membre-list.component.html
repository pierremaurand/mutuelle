<div class="container-fluid entete-page">
  <div class="container" style="width: 1080px;">
    <div class="row">
      <div class="col-md-12 align-middle">
        <span class="h2">Liste des membres</span>
        <span class="text-end">
           <button class="btn btn-primary" routerLink="/add-membre/0">
          <i class="fa fa-user-plus"></i>&nbsp;
          Ajouter un membre
        </button>
        </span>

      </div>
    </div>
  </div>
</div>
<div class="container" style="margin-top: 140px; width: 1080px;">
  <div class="row row-cols-1 row-cols-md-4">
    <div class="col mb-4" *ngFor="let membre of listeMembres">
      <app-membre [membre]="membre"></app-membre>
    </div>
  </div>
</div>
