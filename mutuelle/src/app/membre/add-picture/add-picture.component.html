<div class="modal-dialog modal-dialog-centered modal-md">
  <div class="modal-content">
    <form #pictureForm="ngForm" (ngSubmit)="onSubmit(pictureForm)">
      <div class="modal-body">
        <div class="card shadow">
          <div class="card-header">
            <h3>Formulaire Photo</h3>
          </div>
          <div class="card-body">

            <div class="row">
              <div class="col-md-6 m-auto">
                <div class="image-container">
                  <label for="photo">
                    <img src="{{imageUrl}}" alt="">
                  </label>
                </div>
              </div>
            </div>
            <input type="file" name="photo" id="photo" (change)="fileBrowseHandler($event)">

            <div class="row">
              <div class="btn-group">
                <button type="submit" class="btn btn-success me-2"
                [disabled]="!pictureForm.form.valid">
                  <i class="fa fa-save"></i>&nbsp;
                  Enregistrer
                </button>
                <button type="reset" class="btn btn-warning me-2">
                  <i class="fa fa-refresh"></i>&nbsp;
                  Recommencer
                </button>
                <button type="button" #closeCotisationFormModal class="btn btn-danger" data-bs-dismiss="modal">
                  <i class="fa fa-close"></i>&nbsp;
                  Annuler
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </form>
  </div>
</div>
