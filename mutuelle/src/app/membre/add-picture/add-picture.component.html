<div class="modal-dialog modal-dialog-centered modal-fullscreen">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">Modification de la photo du membre</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <div class="modal-body p-3">
      <div class="row mb-3">
        <div class="col-md-12">
          <div class="card mb-3">
            <div class="card-body">
              <input type="file" (change)="onFileChange($event)" />
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card">
            <div class="card-body">
              <image-cropper [imageChangedEvent]="imgChangeEvt" [maintainAspectRatio]="true" [aspectRatio]="4 / 4"
                [resizeToWidth]="256" format="png" (imageCropped)="cropImg($event)" (imageLoaded)="imgLoad()"
                (cropperReady)="initCropper()" (loadImageFailed)="imgFailed()">
              </image-cropper>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <img [src]="cropImgPreview" />
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="modal-footer ">
      <button type="button" class="btn btn-primary" [disabled]="cropImgPreview==''" (click)="uploadPhoto()">
        <i class="fa fa-save"></i>&nbsp;
        Enregister
      </button>
      <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
        <i class="fa fa-close"></i>&nbsp;
        Annuler
      </button>
    </div>
  </div>
</div>
