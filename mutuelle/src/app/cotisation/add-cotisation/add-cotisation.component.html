<div class="modal-dialog modal-dialog-centered modal-fullscreen">
  <div class="modal-content">
    <form #cotisationForm="ngForm" (ngSubmit)="onSubmit(cotisationForm)">
      <div class="modal-body">
        <div class="card shadow">
          <div class="card-header">
            <h3>Formulaire cotisation</h3>
          </div>
          <div class="card-body">

            <div class="mb-3">
              <label for="periode" class="form-label">Période</label>
              <input type="month" class="form-control"
                id="periode" required
                name="periodeId">
            </div>

            <div class="mb-3">
              <label for="montant" class="form-label">Montant</label>
              <input type="text" class="form-control text-end"
              id="montant" required
              name="montant">
            </div>

            <div class="row">
              <div class="btn-group">
                <button type="submit" class="btn btn-success me-2"
                [disabled]="!cotisationForm.form.valid">
                  <i class="fa fa-save"></i>&nbsp;
                  Enregistrer
                </button>
                <button type="reset" class="btn btn-warning me-2">
                  <i class="fa fa-refresh"></i>&nbsp;
                  Recommencer
                </button>
                <button type="button" #closeCotisationFormModal class="btn btn-danger" data-bs-dismiss="modal">
                  <i class="fa fa-close"></i>&nbsp;
                  Annuler
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </form>
  </div>
</div>
