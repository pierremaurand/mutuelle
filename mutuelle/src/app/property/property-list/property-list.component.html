<div class="mb-3">
  <label>Filter City: &nbsp;</label>
  <input [(ngModel)]="City">
  <button (click)="onCityFilter()">Search</button>
  <button (click)="onCityFilterClear()">Clear</button>&nbsp;

  <label>Sort by &nbsp;</label>
  <select [(ngModel)]="SortbyParam">
    <option value="city">City</option>
    <option value="price">Price</option>
  </select>
  <button *ngIf="SortDirection==='asc'" (click)="onSortDirection()">
    <i class="fas fa-sort-alpha-down"></i>
  </button>
  <button *ngIf="SortDirection==='desc'" (click)="onSortDirection()">
    <i class="fas fa-sort-alpha-up"></i>
  </button>
</div>

<div class="row">
  <div *ngFor="let property of properties | filter:SearchCity:'city'| sort: [SortbyParam,SortDirection]"
    class="col-sm-4">
    <div class="shadow-lg p-3 mb-4">
      <app-property-card [property]="property"></app-property-card>
    </div>
  </div>
</div>
