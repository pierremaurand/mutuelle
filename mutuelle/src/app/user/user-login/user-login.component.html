<div class="row">
  <div class="col-6 m-auto shadow-lg p-0 bg-white">
    <form #loginForm="ngForm" (submit)="onLogin(loginForm)">
      <div class="card m-auto">
        <div class="card-header">
          <h3>Login</h3>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label for="floatingName" class="form-label">Email</label>
            <input type="text" id="floatingName" class="form-control" required ngModel name="email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required ngModel name="password">
          </div>
          <div class="mb-3">
            <input [disabled]="!loginForm.valid" type="submit" class="btn btn-primary me-2" value="Login">
            <input type="reset" class="btn btn-secondary" value="Cancel">
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
