<div class="row">
  <div class="col-6 m-auto shadow-lg p-0 bg-white">
    <form #loginForm="ngForm" (submit)="onLogin(loginForm)">
      <div class="card m-auto">
        <div class="card-header">
          <h3>Connexion au système</h3>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label for="username" class="form-label">Nom d'utilisateur</label>
            <input type="text" id="username" class="form-control" required ngModel name="username">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-control" required ngModel name="password">
          </div>
          <div class="mb-3">
            <button type="submit" class="btn btn-primary me-2" [disabled]="!loginForm.valid">
              <i class="fa fa-sign-in-alt"></i>&nbsp;
              Se connecter
            </button>
            <button type="reset" class="btn btn-danger">
              <i class="fa fa-refresh"></i>&nbsp;
              Recommencer
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
