<div class="col">
  <div class="row m-3">
    <div class="col-md-8">
      <h1>Liste des sexes</h1>
    </div>
    <div class="col-md-4">
      <app-bouton-action (clickEvent)="nouveauSexe()"></app-bouton-action>
    </div>
  </div>
  <div class="row m-3 liste">
    <div class="col-md-2 mb-3" *ngFor="let sexe of sexes">
      <app-detail-sexe [sexe]="sexe"></app-detail-sexe>
    </div>
  </div>
  <div class="row m-3">
    <div class="col-md-12 text-center">
      <app-pagination></app-pagination>
    </div>
  </div>
</div>
