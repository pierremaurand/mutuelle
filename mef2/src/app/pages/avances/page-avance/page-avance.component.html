<div class="col">
  <div class="row m-3">
    <div class="col-md-8">
      <h1>Liste des avances</h1>
    </div>
    <div class="col-md-4">
      <app-bouton-action (clickEvent)="nouveauAvance()"></app-bouton-action>
    </div>
  </div>
  <div class="row m-3 liste">
    <div
      class="col-md-3 mb-3"
      *ngFor="let avance of avances | sort : ['id', 'desc']"
    >
      <app-detail-avance
        [avanceId]="avance.id"
        [membre]="getMembre(avance.membreId)"
        [sexe]="getSexe(getMembre(avance.membreId)?.sexeId)"
        [poste]="getPoste(getMembre(avance.membreId)?.posteId)"
        [lieuAffectation]="
          getLieuAffectation(getMembre(avance.membreId)?.lieuAffectationId)
        "
        [solde]="getSolde(avance.id)"
      ></app-detail-avance>
    </div>
  </div>
  <div class="row m-3">
    <div class="col-md-12 text-center">
      <app-pagination></app-pagination>
    </div>
  </div>
</div>
