<div
  class="card shadow border"
  (click)="modifier()"
  [ngClass]="{
    'text-danger': !membre.estActif,
    'text-success': membre.estActif
  }"
>
  <div class="card-body">
    <div class="row">
      <div class="col-md-5 border-end">
        <div class="card-img-wrapper rounded-circle thumbnail">
          <img src="{{ photo }}" alt="la photo du membre" />
        </div>
      </div>
      <div class="col-md-7">
        <div class="d-block text-truncate infos">
          {{ membre.nom | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ sexe?.nom | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ poste?.libelle | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ lieuAffectation?.lieu | uppercase }}
        </div>
      </div>
    </div>
  </div>
</div>

<div class="col-xl-3 col-md-6 mb-4">
  <div class="card border-left-primary shadow h-100 py-2">
    <div class="card-body">
      <div class="row no-gutters align-items-center">
        <div class="col mr-2">
          <div
            class="text-xs font-weight-bold text-primary text-uppercase mb-1"
          >
            {{ membre.nom }}
          </div>
          <div class="h5 mb-0 font-weight-bold text-gray-800">$40,000</div>
        </div>
        <div class="col-auto">
          <div class="card-img-wrapper rounded-circle thumbnail">
            <img src="{{ photo }}" alt="la photo du membre" />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
