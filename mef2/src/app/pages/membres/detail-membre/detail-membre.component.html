<div
  class="card shadow border"
  (click)="modifier()"
  [ngClass]="{
    'text-danger': !membre.estActif,
    'text-success': membre.estActif
  }"
>
  <div class="card-body">
    <div class="row">
      <div class="col-md-5 border-end">
        <div class="card-img-wrapper rounded-circle thumbnail">
          <img src="{{ photo }}" alt="la photo du membre" />
        </div>
      </div>
      <div class="col-md-7">
        <div class="d-block text-truncate infos">
          {{ membre.nom | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ sexe?.nom | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ poste?.libelle | uppercase }}
        </div>
        <div class="d-block text-truncate infos">
          {{ lieuAffectation?.lieu | uppercase }}
        </div>
      </div>
    </div>
  </div>
</div>
