<div class="container-fluid">
  <!-- Page Heading -->
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">
      <i class="fa fa-info-circle text-primary"></i>&nbsp;Informations du membre
    </h1>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card border-none">
        <div class="card-body">
          <div class="row m-3">
            <div class="col-md-2 mb-3 border-end text-primary">
              <img
                src="{{ photo }}"
                alt="photo du membre"
                class="rounded-circle img-thumbnail"
                width="200px"
                height="200px"
                data-bs-toggle="modal"
                data-bs-target="#addPicture"
              />
            </div>
            <div class="col-md-10">
              <div class="col-md-12">
                <form #membreForm="ngForm">
                  <div class="row">
                    <div class="mb-3 col-md-4">
                      <label for="nom" class="form-label">Nom</label>
                      <input
                        type="text"
                        id="nom"
                        class="form-control"
                        name="nom"
                        [(ngModel)]="membre.nom"
                      />
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="sexeId" class="form-label">Sexe</label>
                      <select
                        id="sexeId"
                        name="sexeId"
                        [(ngModel)]="membre.sexeId"
                        class="form-control"
                      >
                        <option
                          *ngFor="let sexe of sexes"
                          value="{{ sexe.id }}"
                        >
                          {{ sexe.nom | uppercase }}
                        </option>
                      </select>
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="posteId" class="form-label">Poste</label>
                      <select
                        id="posteId"
                        name="posteId"
                        [(ngModel)]="membre.posteId"
                        class="form-control"
                      >
                        <option
                          *ngFor="let poste of postes"
                          value="{{ poste.id }}"
                        >
                          {{ poste.libelle | uppercase }}
                        </option>
                      </select>
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="lieuAffectationId" class="form-label"
                        >Affectation</label
                      >
                      <select
                        id="lieuAffectationId"
                        name="lieuAffectationId"
                        [(ngModel)]="membre.lieuAffectationId"
                        class="form-control"
                      >
                        <option
                          *ngFor="let lieu of lieuAffectations"
                          value="{{ lieu.id }}"
                        >
                          {{ lieu.lieu | uppercase }}
                        </option>
                      </select>
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="dateAdhesion" class="form-label"
                        >Date adhésion</label
                      >
                      <input
                        type="date"
                        id="dateAdhesion"
                        class="form-control"
                        name="dateAdhesion"
                        [(ngModel)]="membre.dateAdhesion"
                      />
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="dateNaissance" class="form-label"
                        >Date de naissance</label
                      >
                      <input
                        type="date"
                        id="dateNaissance"
                        class="form-control"
                        name="dateNaissance"
                        [(ngModel)]="membre.dateNaissance"
                      />
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="lieuNaissance" class="form-label"
                        >Lieu de naissance</label
                      >
                      <input
                        type="text"
                        id="lieuNaissance"
                        class="form-control"
                        name="lieuNaissance"
                        [(ngModel)]="membre.lieuNaissance"
                      />
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="contact" class="form-label">Téléphone</label>
                      <input
                        type="text"
                        id="contact"
                        class="form-control"
                        name="contact"
                        [(ngModel)]="membre.contact"
                      />
                    </div>
                    <div class="mb-3 col-md-4">
                      <label for="email" class="form-label">Email</label>
                      <input
                        type="email"
                        id="email"
                        class="form-control"
                        name="email"
                        [(ngModel)]="membre.email"
                      />
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="text-end mt-3">
      <div>
        <a
          href="javascript:void(0);"
          class="d-none d-sm-inline-block btn shadow-sm mr-1 btn-primary"
          (click)="activer()"
          ><i
            class="fa fa-fw fa-sm text-white-50"
            [ngClass]="{
              'fa-lock': !membre.estActif,
              'fa-lock-open': membre.estActif
            }"
          ></i>
          {{ !membre.estActif ? "Débloquer" : "Bloquer" }}
        </a>
        <a
          href="javascript:void(0);"
          class="d-none d-sm-inline-block btn btn-success shadow-sm mr-1"
          (click)="enregistrerMembre()"
          ><i class="fa fa-save fa-sm text-white-50"></i> Enregistrer</a
        >
        <a
          href="javascript:void(0);"
          class="d-none d-sm-inline-block btn btn-danger shadow-sm"
          (click)="cancel()"
          ><i class="fa fa-close fa-sm text-white-50"></i> Annuler</a
        >
      </div>
    </div>
  </div>

  <div
    id="addPicture"
    class="modal fade"
    tabindex="-1"
    aria-labelledby="addPicture"
    aria-hidden="true"
  >
    <app-image-add
      [photo]="photo"
      (photoChange)="photoChange($event)"
    ></app-image-add>
  </div>
</div>
