<div class="row m-3">
  <div class="col-md-8">
    <h1>Liste des postes</h1>
  </div>
  <div class="col-md-4">
    <app-bouton-action (clickEvent)="nouveauPoste()"></app-bouton-action>
  </div>
</div>
<div class="row m-3 liste">
  <div class="col-md-2 mb-3" *ngFor="let poste of postes">
    <app-detail-poste [poste]="poste"></app-detail-poste>
  </div>
</div>
<div class="row m-3">
  <div class="col-md-12 text-center">
    <app-pagination></app-pagination>
  </div>
</div>
