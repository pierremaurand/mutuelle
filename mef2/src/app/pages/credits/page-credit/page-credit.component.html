<div class="col">
  <div class="row m-3">
    <div class="col-md-8">
      <h1>Liste des credits</h1>
    </div>
    <div class="col-md-4">
      <app-bouton-action (clickEvent)="nouveauCredit()"></app-bouton-action>
    </div>
  </div>
  <div class="row m-3 liste">
    <div
      class="col-md-3 mb-3"
      *ngFor="let credit of credits | sort : ['id', 'desc']"
    >
      <app-detail-credit
        [creditId]="credit.id"
        [membre]="getMembre(credit.membreId)"
        [sexe]="getSexe(getMembre(credit.membreId)?.sexeId)"
        [poste]="getPoste(getMembre(credit.membreId)?.posteId)"
        [lieuAffectation]="
          getLieuAffectation(getMembre(credit.membreId)?.lieuAffectationId)
        "
        [solde]="getSolde(credit.id)"
      ></app-detail-credit>
    </div>
  </div>
  <div class="row m-3">
    <div class="col-md-12 text-center">
      <app-pagination></app-pagination>
    </div>
  </div>
</div>
