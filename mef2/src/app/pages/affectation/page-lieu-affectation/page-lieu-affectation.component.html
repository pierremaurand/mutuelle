<div class="row m-3">
  <div class="col-md-8">
    <h1>Liste des lieux d'affectation</h1>
  </div>
  <div class="col-md-4">
    <app-bouton-action
      (clickEvent)="nouveauLieuAffectation()"
    ></app-bouton-action>
  </div>
</div>
<div class="row m-3 liste">
  <div class="col-md-2 mb-3" *ngFor="let lieuaffectation of lieuaffectations">
    <app-detail-lieu-affectation
      [lieuaffectation]="lieuaffectation"
    ></app-detail-lieu-affectation>
  </div>
</div>
<div class="row m-3">
  <div class="col-md-12 text-center">
    <app-pagination></app-pagination>
  </div>
</div>
