<div class="row m-3">
  <div class="col-md-8">
    <h1>Liste des gabarits</h1>
  </div>
  <div class="col-md-4">
    <app-bouton-action (clickEvent)="nouveauGabarit()"></app-bouton-action>
  </div>
</div>
<div class="row m-3 liste">
  <div class="col-md-2 mb-3" *ngFor="let gabarit of gabarits">
    <app-detail-gabarit [gabarit]="gabarit"></app-detail-gabarit>
  </div>
</div>
<div class="row m-3">
  <div class="col-md-12 text-center">
    <app-pagination></app-pagination>
  </div>
</div>
